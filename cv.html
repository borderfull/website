<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV — Prince Tomar</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #2b2620; }
  body { display: flex; flex-direction: column; }

  .bar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 12px clamp(16px, 4vw, 40px);
    background: #1c1814;
  }
  .bar a { color: inherit; text-decoration: none; }
  .bar .back {
    font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #c9bda5; transition: color .2s;
  }
  .bar .back:hover { color: #f1e9d8; }

  .viewer { flex: 1 1 auto; }
  .viewer iframe { display: block; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <div class="bar">
    <a href="index.html" class="back">← Portfolio</a>
  </div>
  <div class="viewer">
    <iframe src="Prince-Tomar-CV.pdf" title="Prince Tomar — Curriculum Vitae"></iframe>
  </div>
  
  <!-- Vercel Speed Insights -->
  <script type="module">
  import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1/dist/index.mjs';
  injectSpeedInsights();
  </script>
</body>
</html>
