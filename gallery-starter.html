<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Two thematic photographic explorations of Ladakh—Roads and Traces." />
<title>Gallery — Prince Tomar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600;700&family=Spectral:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f1e9d8;
    --paper-2: #ebe2d0;
    --ink: #141410;
    --ink-soft: #5a564f;
    --ink-mute: #9a9590;
    --rule: #d4cdc0;
    --accent: #b15a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); }
  body {
    font-family: 'Spectral', serif;
    font-size: 15px;
    line-height: 1.6;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  /* Header */
  header {
    position: sticky; top: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 16px 28px;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .mark {
    font-family: 'Cormorant', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  header nav {
    display: flex;
    gap: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header nav a {
    padding: 6px 8px;
    transition: color .2s ease;
  }
  header nav a:hover { color: var(--accent); }

  /* Slideshow */
  .slideshow-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: var(--paper);
    overflow: hidden;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity .6s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active { opacity: 1; }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* Exhibition info */
  .exhibition-info {
    position: fixed;
    top: 80px;
    left: 28px;
    max-width: 360px;
    font-size: 13px;
    color: var(--ink-soft);
    z-index: 20;
    pointer-events: none;
  }
  .exhibition-info.hidden { display: none; }
  .exhibition-info h2 {
    font-family: 'Cormorant', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .exhibition-info p {
    margin-bottom: 8px;
    line-height: 1.55;
  }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    align-items: center;
    z-index: 20;
  }

  .slide-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
  }

  button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s ease;
    font-family: 'Cormorant', serif;
  }

  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width .3s ease;
    z-index: 10;
  }

  /* Keyboard hint */
  .hint {
    position: fixed;
    bottom: 28px;
    right: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    text-transform: uppercase;
    opacity: 0.6;
  }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    header nav { font-size: 9px; gap: 16px; }
    .exhibition-info { top: 60px; left: 16px; max-width: 280px; }
    .exhibition-info h2 { font-size: 20px; }
    .controls { bottom: 16px; gap: 12px; }
    .hint { bottom: 16px; right: 16px; font-size: 8px; }
  }

  @media (pointer: coarse) {
    .hint { display: none; }
  }
</style>
</head>
<body data-lang="en">

<header>
  <a href="/" class="mark">Prince <em style="font-style: italic;">Tomar</em></a>
  <nav>
    <a href="/">Portfolio</a>
    <a href="#exhibitions">Exhibitions</a>
  </nav>
</header>

<div id="exhibitions">
  <div class="exhibition-info">
    <h2 id="exhib-title">Roads of Ladakh</h2>
    <p id="exhib-subtitle">Roads in Ladakh are simultaneously less and more than what they stand for.</p>
  </div>

  <div class="slideshow-container" id="slideshow">
    <!-- Slides inserted by JS -->
  </div>

  <div class="progress-bar" id="progress"></div>

  <div class="controls">
    <button id="prev" aria-label="Previous">‹</button>
    <span class="slide-counter"><span id="current">1</span> / <span id="total">20</span></span>
    <button id="next" aria-label="Next">›</button>
  </div>

  <div class="hint">← → or space</div>
</div>

<script>
const exhibitions = [
  {
    title: 'Roads of Ladakh',
    subtitle: 'Roads in Ladakh are simultaneously less and more than what they stand for.',
    images: [
      'images/roads/01.webp',
      'images/roads/02.webp',
      'images/roads/03.webp',
      'images/roads/04.webp',
      'images/roads/05.webp',
      'images/roads/06.webp',
      'images/roads/07.webp',
      'images/roads/08.webp',
      'images/roads/09.webp',
      'images/roads/10.webp',
    ]
  },
  {
    title: 'Traces',
    subtitle: 'The clear landscape of Ladakh appears empty, but never is.',
    images: [
      'images/traces/01.webp',
      'images/traces/02.webp',
      'images/traces/03.webp',
      'images/traces/04.webp',
      'images/traces/05.webp',
      'images/traces/06.webp',
      'images/traces/07.webp',
      'images/traces/08.webp',
      'images/traces/09.webp',
      'images/traces/10.webp',
    ]
  }
];

let allSlides = [];
let currentIdx = 0;

// Flatten exhibitions into one sequence
exhibitions.forEach(exhib => {
  exhib.images.forEach(img => {
    allSlides.push({
      src: img,
      exhib: exhib.title,
      subtitle: exhib.subtitle
    });
  });
});

const slideshow = document.getElementById('slideshow');
const titleEl = document.getElementById('exhib-title');
const subtitleEl = document.getElementById('exhib-subtitle');
const currentEl = document.getElementById('current');
const totalEl = document.getElementById('total');
const progressBar = document.getElementById('progress');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

totalEl.textContent = allSlides.length;

// Create slides
allSlides.forEach((slide, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  if (i === 0) div.classList.add('active');
  div.innerHTML = `<img src="${slide.src}" alt="Exhibition image" loading="lazy" decoding="async" />`;
  slideshow.appendChild(div);
});

function goTo(idx) {
  idx = (idx + allSlides.length) % allSlides.length;
  currentIdx = idx;
  const slides = document.querySelectorAll('.slide');
  slides.forEach(s => s.classList.remove('active'));
  slides[idx].classList.add('active');

  const slide = allSlides[idx];
  titleEl.textContent = slide.exhib;
  subtitleEl.textContent = slide.subtitle;
  currentEl.textContent = idx + 1;
  progressBar.style.width = ((idx + 1) / allSlides.length * 100) + '%';

  // Track exhib change
  document.body.dataset.exhib = slide.exhib.toLowerCase().replace(/\s+/g, '-');
}

prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
nextBtn.addEventListener('click', () => goTo(currentIdx + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo(currentIdx - 1);
  if (e.key === 'ArrowRight') goTo(currentIdx + 1);
  if (e.key === ' ') { e.preventDefault(); goTo(currentIdx + 1); }
});

// Touch swipe
let touchStart = 0;
slideshow.addEventListener('touchstart', e => { touchStart = e.touches[0].clientX; });
slideshow.addEventListener('touchend', e => {
  const touchEnd = e.changedTouches[0].clientX;
  if (touchStart - touchEnd > 50) goTo(currentIdx + 1);
  if (touchEnd - touchStart > 50) goTo(currentIdx - 1);
});

goTo(0);
</script>

</body>
</html>
